metadata:
  status: Active
  source_of_truth: true
  last_updated: 2026-03-27
  purpose: "Canonical terminology used by docs, manifests, and runtime guidance."

terms:
  - term: little-crab
    aliases:
      - opencrab fork
    status: active
    definition: "Local-first fork of OpenCrab preserving grammar, validator behavior, MCP tool surface, and the agentic ontology growth loop while removing server-backed database requirements."
    owned_by: repository
    related_terms:
      - metaontology_os
      - local_first_runtime
      - agentic_growth_loop
    replaced_by: null
  - term: metaontology_os
    aliases:
      - metaontology
    status: active
    definition: "The 9-space ontology grammar that governs node and edge legality and gives agents a stable coordinate system for partial knowledge."
    owned_by: grammar
    related_terms:
      - mcp_surface
      - agentic_growth_loop
    replaced_by: null
  - term: local_first_runtime
    aliases:
      - embedded runtime
    status: active
    definition: "The embedded runtime using LadybugDB, DuckDB, and embedded ChromaDB."
    owned_by: runtime
    related_terms:
      - little-crab
    replaced_by: null
  - term: agentic_growth_loop
    aliases:
      - guided autonomy
      - partial knowledge growth
    status: active
    definition: "The OpenCrab-derived workflow where agents can add evidence, concepts, claims, and relations incrementally, allowing the ontology to grow by filling missing structure over time."
    owned_by: runtime
    related_terms:
      - little-crab
      - metaontology_os
      - mcp_surface
    replaced_by: null
  - term: opencrab_flexibility
    aliases:
      - preserved flexibility
      - investigation flexibility
    status: active
    definition: "The OpenCrab-derived expectation that the runtime should keep partial knowledge usable, support non-English query paths, and preserve enough provenance depth to explain multi-step graph reasoning."
    owned_by: repository
    related_terms:
      - agentic_growth_loop
      - metaontology_os
      - partial_knowledge_visibility
      - non_english_query_viability
      - provenance_depth
    replaced_by: null
  - term: partial_knowledge_visibility
    aliases:
      - incomplete graph visibility
    status: active
    definition: "The requirement that incomplete ontology state remains visible enough for later gap-filling instead of being hidden by read models."
    owned_by: runtime
    related_terms:
      - agentic_growth_loop
      - opencrab_flexibility
    replaced_by: null
  - term: non_english_query_viability
    aliases:
      - unicode query support
      - multilingual query viability
    status: active
    definition: "The requirement that retrieval and investigation flows remain usable for non-English and non-ASCII questions."
    owned_by: runtime
    related_terms:
      - opencrab_flexibility
      - mcp_surface
    replaced_by: null
  - term: provenance_depth
    aliases:
      - multi-hop provenance
    status: active
    definition: "The requirement that provenance views remain deep enough to explain multi-step evidence-to-claim-to-concept-to-outcome connections when the graph supports them."
    owned_by: runtime
    related_terms:
      - opencrab_flexibility
      - agentic_growth_loop
    replaced_by: null
  - term: agent_context_pipeline
    aliases:
      - context pipeline
      - agent context ingress
    status: active
    definition: "The read-only pipeline that assembles one agent-consumable context bundle from the live local stores without becoming a second canonical truth system."
    owned_by: runtime
    related_terms:
      - local_first_runtime
      - mcp_surface
      - agentic_growth_loop
    replaced_by: null
  - term: derived_agent_context
    aliases:
      - context bundle
      - agent-facing context bundle
    status: active
    definition: "The derived bundle of facts, evidence, provenance, gaps, policy hints, scope, uncertainty, and raw references returned for agent-facing reasoning."
    owned_by: runtime
    related_terms:
      - agent_context_pipeline
      - provenance_depth
      - partial_knowledge_visibility
    replaced_by: null
  - term: compatibility_namespace
    aliases:
      - opencrab namespace
    status: active
    definition: "The retained opencrab Python module namespace used for compatibility."
    owned_by: repository
    related_terms:
      - little-crab
    replaced_by: null
  - term: mcp_surface
    aliases:
      - ontology tools
    status: active
    definition: "The stdio JSON-RPC tool interface exposed to agents."
    owned_by: mcp
    related_terms:
      - metaontology_os
      - agentic_growth_loop
    replaced_by: null
